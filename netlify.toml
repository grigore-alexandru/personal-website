[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  path = "/blog"
  function = "inject-blog-list-meta"

[[edge_functions]]
  path = "/blog/*"
  function = "inject-blog-meta"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 5173
